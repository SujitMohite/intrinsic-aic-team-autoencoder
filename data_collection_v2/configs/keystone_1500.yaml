# Keystone 24h session — 1500 trials, full distribution.
# Maps to context/11_24h_strategy/01_data_24h.md targets:
#   - 1500-2000 successful episodes
#   - stratified random over NIC × plug × board pose × grasp noise
#   - SFP : SC = 60 : 40 (so 900 SFP + 600 SC at the per-plug 250 minimum)
#
# Recommended invocation:
#   pixi run python -m data_collection_v2.cli session \
#       --config data_collection_v2/configs/keystone_1500.yaml \
#       --output /data/aic_v2/run_$(date +%Y%m%d_%H%M)

output_dir: /data/aic_v2
target_total_episodes: 1500
seed_start: 1

plug_distribution:
  sfp: 0.60
  sc: 0.40

nic_card_index_distribution:
  uniform_over: [0, 1, 2, 3, 4]   # all 5 NICs (sample_config only documents 0-1)

sc_port_distribution:
  uniform_over: [0, 1]

# Randomization envelope — informed by /tmp/aic_v2_yaw_sweep results
# (2026-05-14): FastCheatCode scores 96 at yaw=π±{0.25, 0.5} but drops to
# 38 at yaw=π exactly. Sample below covers the high-score region; the
# π-band trials should be filtered out before training (total < 70).
nic_rail_translation_range_m: [-0.022, 0.022]      # matches aic_engine sample_config task_board_limits
nic_card_yaw_offset_range_rad: [-0.17, 0.17]       # ±10° per docs/task_board_description.md
sc_rail_translation_range_m: [-0.06, 0.055]        # exact physical limit

task_board_x_range: [0.13, 0.18]    # narrowed to smoke-validated envelope
task_board_y_range: [-0.22, -0.18]  # narrowed
task_board_z_range: [1.12, 1.16]    # narrowed
task_board_yaw_range: [2.64, 3.64]  # π±0.5 (was ±0.3); π itself degenerate — filter post-collection

grasp_offset_xyz_sigma_m: [0.002, 0.002, 0.002]
grasp_offset_rpy_sigma_rad: [0.04, 0.04, 0.04]

gazebo_gui: false
launch_rviz: false
disable_gi: true
camera_downsample_hw: [256, 256]

per_trial_time_limit_s: 40

policy: data_collection_v2.policy.FastCheatCode

quality_gate_every_n_episodes: 100
min_success_rate: 0.85
min_per_nic_demos: 40
min_per_plug_demos: 250

image_jpg_quality: 85
fps: 20

aic_eval_container_name: aic_eval
