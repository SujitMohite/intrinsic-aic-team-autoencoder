# Smoke session: 3 trials, narrowed ranges, lenient gates.
# Per-trial wall clock observed at ~3 min on the desktop (CheatCode insertion
# takes 40-50 s of sim time at RTF ~0.3). 3 trials × 3 min + ~40 s boot ≈ 10 min.
# Bump back up to 10 once we've validated end-to-end plumbing.

output_dir: /tmp/aic_v2_smoke
target_total_episodes: 3
seed_start: 1

plug_distribution:
  sfp: 0.6
  sc: 0.4

nic_card_index_distribution:
  uniform_over: [0, 1, 2]   # narrowed to first 3 NICs; smoke covers SFP-only paths

sc_port_distribution:
  uniform_over: [0, 1]

# Narrowed ranges keep the scene close to the sample_config defaults so any
# physics weirdness shows up immediately.
nic_rail_translation_range_m: [-0.01, 0.01]
nic_card_yaw_offset_range_rad: [-0.05, 0.05]
sc_rail_translation_range_m: [-0.02, 0.02]

task_board_x_range: [0.14, 0.18]
task_board_y_range: [-0.21, -0.19]
task_board_z_range: [1.13, 1.15]
task_board_yaw_range: [3.0, 3.2]

grasp_offset_xyz_sigma_m: [0.001, 0.001, 0.001]
grasp_offset_rpy_sigma_rad: [0.02, 0.02, 0.02]

gazebo_gui: false
launch_rviz: false
disable_gi: true
camera_downsample_hw: [256, 256]

per_trial_time_limit_s: 40

policy: data_collection_v2.policy.FastCheatCode

quality_gate_every_n_episodes: 5
min_success_rate: 0.5   # lenient — smoke just verifies plumbing
min_per_nic_demos: 1
min_per_plug_demos: 2

image_jpg_quality: 85
fps: 20

aic_eval_container_name: aic_eval
