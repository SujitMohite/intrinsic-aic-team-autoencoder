# Keystone session tuned for Laptop 1 (i7-10875H, T1000 4GB).
# Under spec for AIC's recommended GPU but works headless + GI off; ~25-35 ep/h.
# 22h overnight run → ~600-770 episodes contribution to the multi-machine plan.
#
# Lower target (1000) accounts for thermal throttling and slower physics on T1000.
# camera_downsample at 256×256 keeps VRAM under ~3 GB.

output_dir: /data/aic_v2
target_total_episodes: 1000
seed_start: 100000   # offset so Laptop 1's seeds don't collide with Desktop's

plug_distribution:
  sfp: 0.60
  sc: 0.40

nic_card_index_distribution:
  uniform_over: [0, 1, 2, 3, 4]

sc_port_distribution:
  uniform_over: [0, 1]

nic_rail_translation_range_m: [-0.022, 0.022]
nic_card_yaw_offset_range_rad: [-0.17, 0.17]
sc_rail_translation_range_m: [-0.06, 0.055]

task_board_x_range: [0.10, 0.20]
task_board_y_range: [-0.25, -0.05]
task_board_z_range: [1.12, 1.18]
task_board_yaw_range: [2.8, 3.4]

grasp_offset_xyz_sigma_m: [0.002, 0.002, 0.002]
grasp_offset_rpy_sigma_rad: [0.04, 0.04, 0.04]

gazebo_gui: false
launch_rviz: false
disable_gi: true                       # mandatory on T1000
camera_downsample_hw: [256, 256]

per_trial_time_limit_s: 60

quality_gate_every_n_episodes: 100
min_success_rate: 0.80                 # lower bar; T1000 physics is shakier
min_per_nic_demos: 30
min_per_plug_demos: 180

image_jpg_quality: 80                  # marginally more compression to ease disk on laptop

fps: 20

aic_eval_container_name: aic_eval
